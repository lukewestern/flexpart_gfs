site_name: Flexpart
# default is ./site/
# could change this to /var/www/html/docs
site_dir: "/tmp/cr-site/"
# site_dir: "/var/www/html/documentation/general/"
docs_dir: "documentation/"
repo_url: https://gitlab.phaidra.org/flexpart/flexpart
repo_name: IMGW/Flexpart
# this makes relative links  valid
use_directory_urls: false
plugins:
  - tags
  - search
extra_css:
  - mkdocs/stylesheets/extra.css
markdown_extensions:
  - pymdownx.highlight:
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tasklist
  - pymdownx.details
  - pymdownx.emoji